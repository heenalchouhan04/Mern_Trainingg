<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = prompt("Enter a number: ");
        let len = n.length;
        let num1 = parseInt(n.substring(0, (len/2)));
        let num2 = parseInt(n.substring((len/2)));
        let combined = num1 + num2;
        let combinedSquare = combined ** 2;

        if(combinedSquare == parseInt(n)){
            document.write("Yes");
        }else{
            document.write("No");
        }
    </script>
</body>
</html>
