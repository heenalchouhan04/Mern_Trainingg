<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <th>Enter first number</th>
            <td><input type="number" id="n1"></td>
        </tr>

         <tr>
            <th>Enter second number</th>
            <td><input type="number" id="n2"></td>
        </tr>

         <tr>
            <th>Enter third number</th>
            <td><input type="number" id="n3"></td>
        </tr>

         <tr>
            <th>Maximum is</th>
            <td><input type="number" id="max" readonly></td>
        </tr>

        <tr>
        <td colspan="2" style="text-align: center;"><input type="button" value="Maximum number" onclick="findmax()"></td>
        </tr>
    </table>
    <script>
        function findmax(){
            let a = parseInt(document.getElementById('n1').value);
            let b = parseInt(document.getElementById('n2').value);
            let c = parseInt(document.getElementById('n3').value);
            let max = document.getElementById('max');
            if(a > b && a > c){
                max.value = a;
            }
            else if(b > a && b > c){
                max.value = b;
            }
            else{
                max.value = c;
            }
        }
    </script>
</body>
</html>
