<!DOCTYPE html>
<html>
<head>
<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
}

.card{
    width:300px;
    height:200px;
    position:relative;
    transform-style:preserve-3d;

    transition:1s;
}

.card:hover{
    transform:rotateY(180deg);
}

.front,.back{

    width:100%;
    height:100%;
    position:absolute;
    backface-visibility:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    color:white;
    border-radius:20px;
}

.front{
    background:blue;
}

.back{
    background:red;
    transform:rotateY(180deg);
}

</style>
</head>

<body>

<div class="card">

    <div class="front">
        Front Side
    </div>

    <div class="back">
        Back Side
    </div>

</div>

</body>
</html>
