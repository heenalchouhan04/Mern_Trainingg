<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color:black;
        }
        .twitter-btn{
            padding: 15px 40px;
            background-color: white;
            color: brown;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
        }
        .twitter-btn:hover{
            transform: scale(1.1);
            background-color: black;
            color: white;
            border: 2px solid white;
            box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>
    <button class="twitter-btn">❌ Follow</button>
</body>
</html>
