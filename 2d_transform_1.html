<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: hotpink;
            transition: width 3s, transform 3s, border-radius 3s,box-shadow 3s;
            transition-delay: 1s;
        }
        div:hover{
            width: 200px;
            background-color: purple;
            transform: rotate(90deg);
            border-radius: 50px;
            box-shadow: 3px 3px 3px black;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
