<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="https://png.pngtree.com/thumb_back/fh260/background/20240919/pngtree-a-background-of-orange-blue-and-yellow-gradients-with-gritty-appearance-image_16233934.jpg" id="greeting">
    <script>
        function makeCard(){
            return new Promise((resolve)=>{
                setTimeout(()=>{
                    resolve("Card Ready!!!");
                }, 3000);
            });
        }
        async function greeting(){
            document.getElementById('greeting').style.display="block";
            let card = await makeCard();
            console.log(card);
            document.write("greet");
        }
        greeting();
    </script>
</body>
</html>
