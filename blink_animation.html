<!DOCTYPE html>
<html>
<head>
<style>

body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

h1{
    color:lime;
    font-size:50px;
    overflow:hidden;
    white-space:nowrap;
    border-right:4px solid white;
    width:0;

    animation:
    typing 4s steps(20) infinite,
    blink .5s infinite;
}

@keyframes typing{

    from{
        width:0;
    }

    to{
        width:500px;
    }
}

@keyframes blink{

    50%{
        border-color:transparent;
    }
}

</style>
</head>

<body>

<h1>CSS Animation</h1>

</body>
</html>
