<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let computerNumber = parseInt(Math.random()*100);
        document.write(`<h1>START</h1>`);
        for(let i=1 ; i<=5 ; i++){
            let userNumber = +prompt(`Enter ${i} number`)
            if(userNumber == computerNumber){
                alert("WINNER!!! You got the number in ${i} chance(s)");
            }else{
                alert("TRY AGAIN! Only ${5-i} chances are left")
            }
        }
    </script>
</body>
</html>
