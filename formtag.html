<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="fname">First name:</label>
        <input type="text" id="username" name="username"><br><br>
        <label for="lname">Last name:</label>
        <input type="text" id="username" name="username"><br><br>


        <input type="radio" id="html" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="c++" name="fav_language" value="c++">
        <label for="c++">C++</label><br>
        <input type="radio" id="javascript" name="fav_language" value="javascript">
        <label for="javascript">javascript</label><br><br>

        <input type="checkbox" id="vehicle1" name="vehicle1" value="bike">
        <label for="vehicle1">i have a bike</label><br><br>

        <label for="password">Password: </label>
        <input type="password" name="password" id="password"><br><br>

        <label for="readonly">Readonly: </label>
        <input type="text" name="fname" id="" value="john" readonly><br><br>

        <label for="autofocus">Autofocus: </label>
        <input type="text" name="name" id="name" value="heenal" autofocus><br><br>

        <label for="size">Size: </label>
        <input type="text" name="name" id="name" value="heenal" size="10"><br><br>

        <label for="email">Email: </label>
        <input type="email" name="email" id="email"><br><br>

        <label for="number">Number: </label>
        <input type="number" name="number" id="number"><br><br>

        <label for="tel">: </label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br><br>

        <label for="url">URL: </label>
        <input type="url" ><br><br>

        <label for="search">Search: </label>
        <input type="search" name="gsearch" id="gsearch"><br><br>

        <input type="file" name="file" id="file" multiple><br><br>

        <input type="date" name="date" id="date" maxdate="27-05-2026" mindate="27-05-2025"><br><br>

        <input type="time" name="time" id="time"><br><br>

        <input type="datetime-local" name="datetime" id="datetime"><br><br>

        <input type="month" name="month" id="month"><br><br>   
        
        <input type="week" name="color" id="color"><br><br>

        <label for="color">Color: </label>
        <input type="color" name="color" id="color"><br><br>

        <label for="range">Range: </label>
        <input type="range" name="range" id="range" min="0" max="50"><br><br>

        <label for="hidden">Hidden: </label>
        <input type="hidden" name="hidden" value="hidden value"><br><br>

        <label for="reset">Reset: </label>
        <input type="reset" value="reset"><br><br>

        <label for="button">Button: </label>
        <input type="button" value="click" onclick="alert(HELLO)"><br><br>

        <input type="button" value="click" ondoubleclick="alert(HELLO)"><br><br>

        <label for="select">Select: </label>
        <select id="colors" name="colors" multiple>
        <option value="RED">RED</option>
        <option value="PURPLE">PURPLE</option>
        <option value="BLUE">BLUE</option>
        <option value="yellow">YELLOW</option>
        </select><br><br>


        <textarea id="message" name="message" row="4" cols="50">
            Enter your message here...
        </textarea><br><br>
        
        <input type="submit" value="submit"><br><br>
        
    </form> 


</body>
</html>
