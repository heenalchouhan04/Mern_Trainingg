<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let promise = new Promise((resolve, reject)=>{
        let pizza_ready = "no";
        if(pizza_ready == "yes"){
            resolve("Pizza is ready");
        }else{
            reject("Pizza is not ready yet!!");
        }
    });
    promise
    .then((result)=>{
        console.log(result);
    })
    .catch((error)=>{
        console.log(error);
    });

    console.log(promise);
    </script>
</body>
</html>
