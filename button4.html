<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color:black;
        }
        .whatsapp-btn{
            background-color: green;
            color: white;
            font-size: 24px;
            font-family:Arial, Helvetica, sans-serif;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
        }
        .whatsapp-btn:hover{
            transform: scale(1.1);
            background-color: green;
            color: white;
            box-shadow: 0 0 20px yellowgreen,
                        0 0 30px yellowgreen;
        }
    </style>
</head>
<body>
    <button class="whatsapp-btn"> Chat Now</button>
</body>
</html>
