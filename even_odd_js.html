<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <th>Enter any number</th>
            <td><input type="number" id="n1"></td>
        </tr>

         <tr>
            <th>Answer is: (EVEN/ODD)</th>
                <td><input type="text" id="ans" readonly>
            </td>
        </tr>

        <tr>
            <td colspan="2" style="text-align: center;"><input type="button" value="Check Even/Odd" onclick="checkEvenOdd()"></td>
        </tr>

    </table>
    <script>
        function checkEvenOdd(){
            let num= parseInt(document.getElementById('n1').value);
            let ans = document.getElementById('ans');
            if(num%2 === 0){
                ans.value="Even";
            }
            else{
                ans.value="Odd";
            }
        }
    </script>
</body>
</html>
