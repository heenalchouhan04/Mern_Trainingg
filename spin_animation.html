<!DOCTYPE html>
<html>
<head>
<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.loader{
    width:100px;
    height:100px;
    border:10px solid lightgray;
    border-top:10px solid blue;
    border-radius:50%;

    animation:spin 1s linear infinite;
}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="loader"></div>

</body>
</html>
