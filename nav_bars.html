<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Animated Navbars</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{

    background:#0f172a;

    min-height:100vh;

    padding:40px;

    display:flex;
    flex-direction:column;
    gap:50px;
}

/* ================================= */
/* COMMON NAVBAR STYLE */
/* ================================= */

.navbar{

    width:100%;

    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-radius:20px;
}

.logo{

    font-size:30px;

    font-weight:bold;

    color:white;
}

.menu{

    display:flex;

    gap:30px;
}

.menu a{

    text-decoration:none;

    color:white;

    font-size:18px;

    position:relative;

    transition:.5s;
}

/* ================================= */
/* 1. NEON NAVBAR */
/* ================================= */

.neon-nav{

    background:#111;

    border:2px solid cyan;

    box-shadow:
    0 0 10px cyan,
    0 0 30px cyan;
}

/* Hover Underline */

.neon-nav .menu a::after{

    content:"";

    position:absolute;

    left:0;
    bottom:-5px;

    width:0%;
    height:3px;

    background:cyan;

    transition:.5s;
}

.neon-nav .menu a:hover::after{

    width:100%;
}

.neon-nav .menu a:hover{

    color:cyan;

    text-shadow:
    0 0 10px cyan;
}

/* ================================= */
/* 2. GLASSMORPHISM NAVBAR */
/* ================================= */

.glass-nav{

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,.2);

    box-shadow:
    0 8px 20px rgba(0,0,0,.3);
}

.glass-nav .menu a:hover{

    transform:translateY(-5px);

    color:cyan;
}

/* ================================= */
/* 3. GRADIENT NAVBAR */
/* ================================= */

.gradient-nav{

    background:linear-gradient(
    45deg,
    #ff0066,
    #6600ff,
    #00ccff);

    background-size:300% 300%;

    animation:gradientMove 5s infinite linear;
}

/* Gradient Animation */

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:100% 50%;
    }
}

.gradient-nav .menu a:hover{

    transform:scale(1.2);

    color:yellow;
}

/* ================================= */
/* 4. MODERN DARK NAVBAR */
/* ================================= */

.dark-nav{

    background:#1e293b;

    border-left:6px solid cyan;
}

/* Animated Hover Box */

.dark-nav .menu a{

    padding:10px 15px;

    border-radius:10px;
}

.dark-nav .menu a:hover{

    background:cyan;

    color:black;

    box-shadow:
    0 0 15px cyan;

    transform:scale(1.1);
}

/* ================================= */
/* 5. PREMIUM HOVER NAVBAR */
/* ================================= */

.premium-nav{

    background:#111827;

    overflow:hidden;

    position:relative;
}

/* Shine Effect */

.premium-nav::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.2),
    transparent);

    animation:shine 4s infinite;
}

/* Shine Animation */

@keyframes shine{

    100%{
        left:100%;
    }
}

.premium-nav .menu a:hover{

    color:lime;

    transform:
    scale(1.2)
    rotate(-5deg);

    text-shadow:
    0 0 10px lime;
}

/* ================================= */
/* RESPONSIVE */
/* ================================= */

@media(max-width:768px){

    .navbar{

        flex-direction:column;

        gap:20px;

        text-align:center;
    }

    .menu{

        flex-wrap:wrap;

        justify-content:center;
    }
}

</style>
</head>

<body>

<!-- ================================= -->
<!-- 1. NEON NAVBAR -->
<!-- ================================= -->

<nav class="navbar neon-nav">

    <div class="logo">
        NeonUI
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>

    </div>

</nav>

<!-- ================================= -->
<!-- 2. GLASS NAVBAR -->
<!-- ================================= -->

<nav class="navbar glass-nav">

    <div class="logo">
        GlassUI
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Portfolio</a>
        <a href="#">Projects</a>
        <a href="#">Team</a>

    </div>

</nav>

<!-- ================================= -->
<!-- 3. GRADIENT NAVBAR -->
<!-- ================================= -->

<nav class="navbar gradient-nav">

    <div class="logo">
        GradientUI
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Blog</a>
        <a href="#">Gallery</a>
        <a href="#">Support</a>

    </div>

</nav>

<!-- ================================= -->
<!-- 4. DARK NAVBAR -->
<!-- ================================= -->

<nav class="navbar dark-nav">

    <div class="logo">
        DarkUI
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Login</a>

    </div>

</nav>

<!-- ================================= -->
<!-- 5. PREMIUM NAVBAR -->
<!-- ================================= -->

<nav class="navbar premium-nav">

    <div class="logo">
        PremiumUI
    </div>

    <div class="menu">

        <a href="#">Home</a>
        <a href="#">Store</a>
        <a href="#">Offers</a>
        <a href="#">Profile</a>

    </div>

</nav>

</body>
</html>
