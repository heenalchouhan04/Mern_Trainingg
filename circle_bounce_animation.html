<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.ball{
    width:100px;
    height:100px;
    background:red;
    border-radius:50%;

    animation:bounce 1s infinite alternate;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-300px);
    }
}

</style>
</head>

<body>

<div class="ball"></div>

</body>
</html>
