<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <details style="text-align: left;">
            <summary>
                1.Addition<br>
                2.Subtraction<br>
                3.Multiplication<br>
                4.Division<br>
            </summary>
        </details><br><br>
    
    <table border="2">
        <tr>
            <th>Enter first number</th>
            <td><input type="number" id="n1"></input></td>
        </tr>

        <tr>
            <th>Enter second number</th>
            <td><input type="number" id="n2"></input></td>
        </tr>

        <tr>
            <th>Enter choice</th>
            <td><input type="number" id="choice"></input></td>
        </tr>

        <tr>
            <th>Result</th>
            <td><input type="number" id="result"></input></td>
        </tr>

        <tr>
            <td colspan="2" style="text-align: center;"><input type="button" value="Calculate" onclick="calculate()"></input></td>
        </tr>
    </table>
    <script>
        function calculate(){
        let num1 = parseInt(document.getElementById('n1').value);
        let num2 = parseInt(document.getElementById('n2').value);
        let choice = parseInt(document.getElementById('choice').value);
        switch(choice){
        case 1:
            document.getElementById('result').value = num1+num2;
            break;
        case 2:
            document.getElementById('result').value = num1-num2;
            break;
        case 3:
            document.getElementById('result').value = num1*num2;
            break;
        case 4:
            document.getElementById('result').value = num1/num2;
            break;
        default:
            alert("Invalid choice");
        }
    }
    </script>
</body>
</html>
