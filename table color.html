<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        tr:nth-child(even){
            background-color:lightblue;
        }
        tr:nth-child(odd){
            background-color:lightcyan;
        }
        caption{
            color:blue;
            font-size:30px;
        }
        tr:hover{
            background-color:lightgreen;
        }
        td:hover{
            background-color:linen;
        }
        th:nth-child(1){
            background-color:lightcoral;
        }
    </style>
</head>
<body>
    <table border="4" align="center">
        <caption>Techno </caption>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>City</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Aman</td>
        <td>udaipur</td>
        <td>99</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Ayush</td>
        <td>Jaipur</td>
        <td>88</td>
    </tr>
    </table>
</body>
</html>
