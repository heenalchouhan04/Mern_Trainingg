<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  body{
    background-color:beige;
  }
  div{
     border: 4px solid white;
     width:40%;
     background-color:white;
     text-align: center;
     border-radius: 10px;
     font-weight: bold;
     letter-spacing: 2px;
     padding: 10px;
     margin-top: 100px;
     text-align: center;
     border-bottom-color: darkgreen;
     border-right-color: darkgreen;
     box-shadow: 5px 5px 10px;
  }
    input[type="tel"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px;
        width: 89%;
        border-color: green;
    }
    input[type="email"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px;
        width: 89%;
        border-color: green;
    }
    input[type="text"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px;
        width: 89%;
        border-color: green;
    }
    textarea{
       border-radius: 5px;
       font-weight: 700;
       letter-spacing: 2px;
       padding: 10px;
       width: 89%;
       border-color: green;
    }
    input[type="submit"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px;
        width: 89%;
        background-color: limegreen;
    }
</style>
<body>
  <form>
  <center>
    <div>
   <h2 style="text-align: center;">FEEDBACK FORM</h2>

   <input type="text" name="first name" id="fname" placeholder="First Name" ><br><br>

   <input type="text" name="last name" id="lname" placeholder="Last Name"><br><br>

   <input type="tel" name="phone" id="phone" placeholder="Phone" pattern="[0-9]{10}"><br><br>

   <input type="email" name="email" id="email" placeholder="Email"><br><br>

   <textarea name="feedback" id="feedback" placeholder="Your Feedback" rows="4" cols="40">
    Your Feedback...
  </textarea><br><br>

   <input type="submit" name="submit" id="submit" value="SUBMIT FEEDBACK"><br><br>
  </div>
  </center>
  </form>
</body>
</html>
