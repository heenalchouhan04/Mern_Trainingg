<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        border: 2px solid black;
        width:70%;
        height:150%;
        background-color:burlywood;
        background-image: url('https://img.freepik.com/free-photo/fitness-concept-with-dumbbells-frame_23-2148531434.jpg?semt=ais_hybrid&w=740&q=80');
        text-align: left;
        border-radius: 10px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 10px;
    }
    input[type="submit"]{
        border-radius: 5px;
        font-weight: bold;
        background-color:lightblue;
        letter-spacing: 2px;
        padding: 5px;
        margin-top: 15px;
        text-align: center;
    }
    input[type="reset"]{
        border-radius: 5px;
        font-weight: bold;
        background-color: lightblue;
        letter-spacing: 2px;
        padding: 5px;
        margin-top: 15px;
        text-align: center;
    }
    input[type="tel"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding:5px;
        width: 28%;
        border-color: black;
    }
    input[type="email"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        width: 30%;
        border-color: black;
    }
    input[type="text"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        width: 28%;
        border-color: black;
    }
    input[type="password"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        width: 28%;
        border-color: black;
    }
    input[type="date"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        width: 28%;
        border-color: black;
    }
    input[type="radio"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        width: 5%;
        border-color: black;
    }
    input[type="file"]{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        border-color: black;
    }
    select{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        border-color: black;
    }
    option{
        border-radius: 5px;
        font-weight: bold;
        letter-spacing: 2px;
        padding: 5px;
        border-color: black;
    }
    textarea{
       border-radius: 5px;
       font-weight: 700;
       letter-spacing: 2px;
       padding: 10px;
       width: 89%;
       border-color: black;
    }
</style>
<body>
    <form>
    <div>
    <h2 style="text-align: center;">STUDENT REGISTRATION FORM</h2>

    <label for="name">Student Name: </label>
    <input type="text" name="first name" id="fname" placeholder="First name">
    <input type="text" name="last name" id="lname" placeholder="last name"><br><br>

    <label for="fname">Father Name: </label>
    <input type="text" name="father name" id="fname" placeholder="Enter your father name"><br><br>

    <label for="dob"><abbr title="Date of Birth">D.O.B: </abbr></label>
    <input type="date" name="dob" id="date"><br><br>

    <label for="roll no.">Roll No.: </label>
    <input type="tel" name="roll no." id="roll" placeholder="Enter your roll no." pattern="[0-9]{5}"><br><br>

    <label for="mobile">Mobile No.: </label>
    <input type="tel" name="mobile" id="mobile" placeholder="Enter your mobile no." pattern="[0-9]{10}"><br><br>

    <label for="email">Email Id: </label>
    <input type="email" name="email" id="email" placeholder="Enter your email"><br><br>

    <label for="password">Password: </label>
    <input type="password" name="password" id="password" placeholder="Enter your password" minlength="10"><br><br>

    <label for="gender">Gender: </label>
    <input type="radio" id="male" name="gender">
    <label for="gender">Male</label>
    <input type="radio" id="female" name="gender">
    <label for="female">Female</label><br><br>

    <label for="department">Department: </label>
    <input type="radio" id="cse" name="department">
    <label for="cse">CSE</label>
    <input type="radio" id="it" name="department">
    <label for="it">IT</label>
    <input type="radio" id="ece" name="department">
    <label for="ece">ECE</label><br><br>

    <label for="course">Course: </label>
    <select id="course" name="course" placeholder="Select">
    <option value="cse">CSE</option>
    <option value="it">IT</option>
    <option value="ece">ECE</option>
    <option value="ml">ML</option>
    </select><br><br>

    <label for="photo">Student Photo: </label>
    <input type="file" name="photo" id="photo"><br><br>

    <label for="city">City: </label>
    <input type="text" name="city" id="city" placeholder="Enter your city"><br><br>

    <label for="address">Address: </label>
    <textarea name="address" id="address" rows="5" cols="50">
        Enter your address here...
    </textarea><br><br>

    <input type="submit" value="SUBMIT">

    <input type="reset" value="RESET">
    </div>
</form>

</body>
</html>
