<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <th>Enter Product Name</th>
            <td><input type="string" id="pname"></td>
        </tr>

        <tr>
            <th>Enter Product Qty</th>
            <td><input type="number" id="pqty"></td>
        </tr>

        <tr>
            <th>Enter Price</th>
            <td><input type="number" id="pprice">
                <input type="button" value="Ok" onclick="ok()">
        </tr>

        <tr>
            <th>Total Amount</th>
            <td><input type="number" id="total" readonly>
        </tr>

        <tr>
            <th>Discount(12.50%)</th>
            <td><input type="number" id="dis" readonly>
        </tr>

        <tr>
            <th>Amount to Pay</th>
            <td><input type="number" id="amttopay" readonly>
        </tr>

        <tr>
            <th>Shopkeeper Discount</th>
            <td><input type="number" id="shpdis">
                <input type="button" value="Amount" onclick="amount()">
        </tr>

        <tr>
            <th>Amount to Pay</th>
            <td><input type="number" id="amttopay1" readonly>
        </tr>
        
    </table>
    <script>
        function ok(){
            let a= document.getElementById('pname').value;
            let b= parseInt(document.getElementById('pqty').value);
            let c= parseInt(document.getElementById('pprice').value);
            let total = b*c;
                document.getElementById('total').value=total;
            let discount = total*0.125/100;
                document.getElementById('dis').value=discount;
            let amount = total-discount;
            document.getElementById('amttopay').value=amount;
        }
        function amount(){
            let b= parseInt(document.getElementById('pqty').value);
            let c= parseInt(document.getElementById('pprice').value);
            let total = b*c;
                document.getElementById('total').value=total;
            let discount = total*0.125/100;
                document.getElementById('dis').value=discount;
            let amount = total-discount;
            document.getElementById('amttopay').value=amount;

            let a= parseInt(document.getElementById('shpdis').value);
            document.getElementById('amttopay1').value=amount-a;
        }
    </script>
</body>
</html>
