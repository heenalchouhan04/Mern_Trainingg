<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <textarea id="type"></textarea>
    <p id="resultId"></p>
    <script>
        function show(){
            document.getElementById("resultId").innerHTML = "typing...";
            setTimeout(() => {
                document.getElementById("resultId").innerHTML = "";
            },1000);
        }
        document.getElementById("type").addEventListener("input",show);
    </script>
</body>
</html>
