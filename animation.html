<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            height: 100px;
            width: 100px;
            background-color:paleturquoise;
            animation: example 2s;
            animation-delay: 2s;
            animation-iteration-count: infinite;
            animation-direction: alternate-reverse;
            position: relative;
        }
        @keyframes example{
            from{background-color:red; border-radius: 1px; font-size: 20px;}
            to{background-color: darksalmon; border-radius: 50px; font-size: 50%;}
            0%{background-color: midnightblue; left: 0px; top: 0px;}
            25%{background-color:darkred; left: 200px; top: 0px;}
            50%{background-color:indianred; left: 200px; top: 200px;}
            75%{background-color:mediumvioletred; left:0px; top: 200px;}
            100%{background-color:cornflowerblue; left:0px; top: 0px;}
            
        }
    </style>
</head>
<body>
    <div>
        A
    </div>
</body>
</html>
