<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let n = 192;
        let ans = `${n}${n*2}${n*3}`;
        let set = new Set(ans);
        document.write([...set]);

        if(set.size == 9){
            document.write("Yes");
        }else{
            document.write("No");
        }
    </script>
