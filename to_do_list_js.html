<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>To Do List</title>
    
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background-image: url('https://img.freepik.com/free-photo/pink-school-supplies-desk_23-2148194646.jpg?semt=ais_hybrid&w=740&q=80');
        background-repeat: no-repeat;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container{
        background: lightpink;
        width: 400px;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 18px 19px 30px rgba(0,0,0,0.2);
    }

    h1{
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .input-section{
        display: flex;
        gap: 10px;
    }

    .input-section input{
        width: 270px;
        /*flex: 1;*/
        padding: 10px;
        border-radius: 8px;
        border: 1px solid gray;
    }

    .input-section button{
        padding: 10px 15px;
        border: none;
        background: rgb(227, 140, 154);
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }
 
    .input-section button:hover{
        background: palevioletred;
    }

    .search-section input{
        width: 270px;
        padding: 10px;
        margin-top: 15px;
        border-radius: 8px;
        border: 1px solid black;
    }

    .search-section button{
        padding: 10px 15px;
        border: none;
        background: rgb(227, 140, 154);
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    .search-section button:hover{
        background: palevioletred;
    }

    .task-info{
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 14px;
    }

    ul{
        margin-top: 20px;
    }

    li{
        list-style: none;
        background: #f5f5f5;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .completed{
        text-decoration: line-through;
        color: gray;
    }

    .btn-group{
        display: flex;
        gap: 8px;
    }

    .complete-btn{
        background: green;
        color: white;
        border: none;
        padding: 7px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .delete-btn{
        background: red;
        color: white;
        border: none;
        padding: 7px 10px;
        border-radius: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

    <div class="container">
        <h1>📝 To Do List</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter item">
            <button onclick="addTask()">Add</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search item">
            <button onclick="searchTask()">Search</button>
        </div>

        <div class="task-info">
            <p>All: <span id="allTask">0</span></p>
            <p>Completed: <span id="completedTask">0</span></p>
            <p>Pending: <span id="pendingTask">0</span></p>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        
    </script>
</body>
</html>
