<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color:black;
        }
        .youtube-btn{
            background-color: red;
            color: white;
            font-size: 24px;
            font-family:'Times New Roman', Times, serif;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
        }
        .youtube-btn:hover{
            transform: scale(1.1);
            background-color: white;
            color: #ff0000;
            box-shadow: 0 0 20px #ff0000,
                        0 0 30px #ff0000;
        }
    </style>
</head>
<body>
    <button class="youtube-btn">YouTube </button>
</body>
</html>
