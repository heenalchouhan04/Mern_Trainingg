<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Button Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:40px;
    background:#0f172a;
}

/* Common Button Style */

.btn{
    position:relative;
    padding:18px 45px;
    font-size:22px;
    color:white;
    border:none;
    cursor:pointer;
    overflow:hidden;
    transition:.5s;
    letter-spacing:1px;
}

/* ========================= */
/* 1. Neon Glow Button */
/* ========================= */

.neon{
    background:#111;
    border:2px solid cyan;
    border-radius:50px;
}

.neon:hover{
    color:black;
    background:cyan;
    transform:scale(1.1);
    box-shadow:
    0 0 10px cyan,
    0 0 30px cyan,
    0 0 60px cyan;
}

/* ========================= */
/* 2. Gradient Button */
/* ========================= */

.gradient{
    border-radius:12px;
    background:linear-gradient(
    45deg,
    #ff0066,
    #6600ff,
    #00ccff);
    background-size:300% 300%;
    animation:gradientMove 4s infinite linear;
}

.gradient:hover{
    transform:
    translateY(-10px)
    scale(1.1);
    box-shadow:
    0 10px 30px rgba(0,0,0,.5);
}

/* Gradient Animation */

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:100% 50%;
    }
}

/* ========================= */
/* 3. Glassmorphism Button */
/* ========================= */

.glass{

    background:rgba(255,255,255,.1);

    border:2px solid rgba(255,255,255,.2);

    backdrop-filter:blur(10px);

    border-radius:20px;

    box-shadow:
    0 8px 20px rgba(0,0,0,.3);
}

.glass:hover{

    transform:rotate(-3deg) scale(1.1);

    background:rgba(255,255,255,.2);

    box-shadow:
    0 0 20px white;
}

/* ========================= */
/* 4. Liquid Fill Button */
/* ========================= */

.liquid{

    border:2px solid lime;

    background:transparent;

    border-radius:50px;

    z-index:1;
}

/* Animated Background */

.liquid::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:lime;

    transition:.5s;

    z-index:-1;
}

.liquid:hover::before{

    left:0;
}

.liquid:hover{

    color:black;

    transform:scale(1.1);

    box-shadow:
    0 0 20px lime,
    0 0 50px lime;
}

/* ========================= */
/* 5. 3D Shadow Button */
/* ========================= */

.shadow3d{

    background:#ff5722;

    border-radius:15px;

    box-shadow:
    0 8px 0 #c63f17;
}

/* Click Effect */

.shadow3d:hover{

    transform:translateY(5px);

    box-shadow:
    0 3px 0 #c63f17;
}

/* ========================= */
/* 6. Border Animation Button */
/* ========================= */

.borderAnim{

    background:#111;

    border-radius:10px;

    border:2px solid white;
}

.borderAnim::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.4),
    transparent);

    transition:.6s;
}

.borderAnim:hover::before{

    left:100%;
}

.borderAnim:hover{

    transform:scale(1.1);

    box-shadow:
    0 0 20px white;
}

</style>
</head>

<body>

<!-- Neon Glow -->

<button class="btn neon">
    Neon Button
</button>

<!-- Gradient -->

<button class="btn gradient">
    Gradient Button
</button>

<!-- Glass -->

<button class="btn glass">
    Glass Button
</button>

<!-- Liquid -->

<button class="btn liquid">
    Liquid Fill
</button>

<!-- 3D Shadow -->

<button class="btn shadow3d">
    3D Button
</button>

<!-- Border Animation -->

<button class="btn borderAnim">
    Border Effect
</button>

</body>
</html>
