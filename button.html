<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color:white;
        }
        .telegram-btn{
            padding: 15px 40px;
            background-color: blue;
            color: brown;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.5s;
        }
        .telegram-btn:hover{
            transform: scale(1.15);
            background-color: black;
            color: cadetblue;
            box-shadow: 0 0 20px aquamarine,
                        0 0 50px burlywood;
        }
    </style>
</head>
<body>
    <button class="telegram-btn">Join Channel 🚀</button>
</body>
</html>
