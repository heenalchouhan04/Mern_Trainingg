<!DOCTYPE html>
<html>
<head>
<style>

body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

a{
    padding:20px 40px;
    color:cyan;
    border:2px solid cyan;
    text-decoration:none;
    font-size:30px;

    transition:.5s;
}

a:hover{

    background:cyan;
    color:black;

    box-shadow:
    0 0 10px cyan,
    0 0 40px cyan,
    0 0 80px cyan;
}

</style>
</head>

<body>

<a href="#">Hover Me</a>

</body>
</html>
