<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <th>Enter radius</th>
            <td><input type="number" id="radius"></td>
        </tr>
        <tr>
            <th>Area</th>
            <td><input type="number" id="area"></td>
        </tr>
        <tr>
        <td colspan="2" style="text-align: center;"><input type="button" value="Click Me!!!" onclick="calc()"></td>
        </tr>
    </table>
    <script>
        function calc()
        {
            let a= parseInt(document.getElementById ('radius').value);
            document.getElementById('area').value=(3.14*a*a);
        }
    </script>
</body>
</html>
