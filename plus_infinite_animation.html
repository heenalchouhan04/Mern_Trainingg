<!DOCTYPE html>
<html>
<head>
<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}

button{
    padding:20px 40px;
    font-size:25px;
    border:none;
    background:cyan;
    border-radius:50px;

    animation:pulse 1s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<button>Click Me</button>

</body>
</html>
