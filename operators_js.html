<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h1>License Eligibility Checker</h1>
        <button onclick="checkEligibility()">Check Eligibility</button>
        <script>
            function checkEligibility() {
                let age = prompt("Please enter your age:");
                if (age >= 18) {
                    document.write("You are eligible for a driver's license.");
                } else {
                    document.write("You are not eligible for a driver's license.");
                }
            }
    </script>
</body>
</html>
