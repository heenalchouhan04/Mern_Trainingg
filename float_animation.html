<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    overflow:hidden;
    background:#001f3f;
}

.bubble{
    width:80px;
    height:80px;
    background:rgba(255,255,255,.3);
    border-radius:50%;
    position:absolute;
    bottom:-100px;

    animation:float 6s infinite;
}

.b1{ left:10%; animation-delay:0s; }
.b2{ left:40%; animation-delay:2s; }
.b3{ left:70%; animation-delay:4s; }

@keyframes float{

    0%{
        transform:translateY(0);
    }

    100%{
        transform:translateY(-120vh);
    }
}

</style>
</head>

<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

</body>
</html>
